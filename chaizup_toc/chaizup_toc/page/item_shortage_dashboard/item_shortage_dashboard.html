<!-- =============================================================================
  CONTEXT: Item Shortage Dashboard Page — single-pane item shortage view.
    Renders 27 columns of supply/demand per (item × warehouse rule). Every
    numeric cell is clickable → drill-down modal with contributing docs.
    Uses Tabulator (frontend plugin) for the grid: native sort + multi-sort
    via shift-click, column reorder, frozen header, CSV/XLSX/JSON export,
    row formatter for the pending-SO light-red highlight.

  MEMORY: chaizup_item_shortage_dashboard.md § Page (added 2026-05-14)
          app_chaizup_toc.md § Pages

  INSTRUCTIONS:
    - Class / ID prefix:  isd-  (Item Shortage Dashboard).
    - CSS variables:      --isd-* mirroring the Tiger Theme slate palette.
    - Tabulator + Font Awesome loaded from CDN. SRI hashes intentionally
      omitted to keep version bumps local-only (no need to recompute hash
      every time we bump the lib).
    - All onclick / oninput attribute values use &quot; never raw '.
      Frappe wraps the entire HTML template body in a single-quoted JS
      string at page-script generation time — a single raw ' anywhere
      breaks the wrap → SyntaxError → BLANK PAGE.
    - CSS % values MUST end with `;` before `}` to dodge Frappe's
      microtemplate %} block-close parser.
    - Use --slate-* (defined here as --isd-sl-*); NEVER --stone-* (undefined).

  DANGER ZONE:
    - Frappe HTML template single-quote rule (WKP-001):
        onclick="fn(&quot;x&quot;)" — CORRECT
        onclick="fn('x')"          — BREAKS PAGE
    - %} sequence rule: width:40%;} CORRECT — width:40%} BREAKS PAGE
    - Tabulator placeholder injection: pass element node, NOT inline HTML
      with raw apostrophes — Frappe wraps the JS template too.

  RESTRICT:
    - Do NOT add server-side rendering. All data via frappe.call().
    - Do NOT rename DOM IDs (#isd-root, #isd-grid, #isd-banner, …) —
      they are bound by item_shortage_dashboard.js.
    - Do NOT switch grid library without re-implementing every Tabulator
      feature listed in the .md file (multi-sort, frozen, export, row fmt).
============================================================================= -->

/* ============================================================
   § ROOT VARIABLES — Item Shortage Dashboard (slate palette)
   Mirror of Tiger Theme used by Production Overview so the page
   visually aligns with the rest of chaizup_toc.
   ============================================================ */

  --isd-surface:  #ffffff;
  --isd-border:   #e2e8f0;
  --isd-text:     #0f172a;

  --isd-sl-50:    #f8fafc;
  --isd-sl-100:   #f1f5f9;
  --isd-sl-200:   #e2e8f0;
  --isd-sl-300:   #cbd5e1;
  --isd-sl-400:   #94a3b8;
  --isd-sl-500:   #64748b;
  --isd-sl-700:   #334155;
  --isd-sl-900:   #0f172a;
  --isd-ok:       #10b981;
  --isd-ok-bg:    #d1fae5;
  --isd-warn:     #f59e0b;
  --isd-warn-bg:  #fef3c7;
  --isd-err:      #ef4444;
  --isd-err-bg:   #fee2e2;
  --isd-info:     #0ea5e9;
  --isd-info-bg:  #e0f2fe;
  --isd-brand:    #4f46e5;
  --isd-brand-h:  #4338ca;
  --isd-r-sm:     4px;
  --isd-r-md:     8px;
  --isd-r-lg:     12px;
  --isd-sh-sm:    0 1px 2px 0 rgba(0,0,0,.05);
  --isd-sh-md:    0 4px 6px -1px rgba(0,0,0,.1),0 2px 4px -2px rgba(0,0,0,.1);
}

/* Root container fills the page body. */
#isd-root {

  flex-direction:column;

  -webkit-font-smoothing:antialiased;
}

/* Scrollbars (subtle, matches Frappe desk theme). */

#isd-root ::-webkit-scrollbar-thumb { background:var(--isd-sl-300);border-radius:3px; }
#isd-root ::-webkit-scrollbar-thumb:hover { background:var(--isd-sl-400); }

/* ============================================================
   § HEADER — Title + pending-status banner + filters
   ============================================================ */
.isd-hdr {

  border-bottom:1px solid var(--isd-border);

}

}
.isd-banner {

  color:var(--isd-sl-700);
  background:var(--isd-info-bg);

.isd-banner a:hover { text-decoration:underline; }

/* ============================================================
   § FILTERS BAR — multi-select + month/year + universal search
   ============================================================ */
.isd-filters {
  background:var(--isd-surface);
  border-bottom:1px solid var(--isd-border);

}

.isd-label {

}
.isd-input,
.isd-select {

.isd-select:focus {

/* Chip-style multi-select using <select multiple>. */
.isd-chips {

  align-items:center;
}
.isd-chip {
  display:inline-flex;
  align-items:center;
  gap:4px;
  background:var(--isd-info-bg);
  color:var(--isd-info);

.isd-chip-opt {

  font-size:12px;
  cursor:pointer;
  white-space:nowrap;
}
.isd-chip-opt:hover { background:var(--isd-sl-100); }
.isd-chip-opt.isd-chip-opt-sel { background:var(--isd-info-bg);color:var(--isd-info-text); }

/* ============================================================
   § ACTION BAR — buttons + summary chips
   ============================================================ */
.isd-actions {
  background:var(--isd-surface);
  border-bottom:1px solid var(--isd-border);
  padding:8px 16px;
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
  flex-shrink:0;
}
.isd-btn {
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:6px 12px;
  font-size:12px;
  font-weight:500;
  background:var(--isd-surface);
  color:var(--isd-sl-700);
  border:1px solid var(--isd-border);
  border-radius:var(--isd-r-sm);

  transition:background .15s,border-color .15s,box-shadow .15s;
}
.isd-btn:hover {
  background:var(--isd-sl-50);
  border-color:var(--isd-sl-300);
  box-shadow:var(--isd-sh-sm);
}
.isd-btn-brand {
  background:var(--isd-brand);
  color:#fff;
  border-color:var(--isd-brand);
}
.isd-btn-brand:hover {
  background:var(--isd-brand-h);
  border-color:var(--isd-brand-h);
}
.isd-summary-bar { display:flex;gap:8px;margin-left:auto;flex-wrap:wrap; }
/* Modern stat cards — each summary is a tiny card with a left accent strip
   instead of a flat pill. Improves at-a-glance scannability. ISD-011 */
.isd-stat {
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:6px 12px 6px 10px;
  font-size:11px;
  border-radius:var(--isd-r-md);
  background:var(--isd-surface);
  color:var(--isd-sl-700);
  border:1px solid var(--isd-border);
  box-shadow:var(--isd-sh-sm);

  line-height:1.2;
}
.isd-stat::before {
  content:"";
  position:absolute;
  left:0;top:0;bottom:0;

  border-radius:var(--isd-r-md) 0 0 var(--isd-r-md);
  background:var(--isd-sl-400);
}
.isd-stat-val {
  font-weight:700;
  color:var(--isd-sl-900);
  font-size:14px;
  font-variant-numeric:tabular-nums;
}
.isd-stat-err::before  { background:var(--isd-err);  }
.isd-stat-warn::before { background:var(--isd-warn); }
.isd-stat-ok::before   { background:var(--isd-ok);   }
.isd-stat-info::before { background:var(--isd-info); }
.isd-stat-err  .isd-stat-val { color:var(--isd-err);  }
.isd-stat-warn .isd-stat-val { color:var(--isd-warn); }
.isd-stat-ok   .isd-stat-val { color:var(--isd-ok);   }
.isd-stat-info .isd-stat-val { color:var(--isd-info); }

/* ============================================================
   § GRID CONTAINER — Tabulator host
   ============================================================ */
.isd-grid-wrap {
  flex:1;
  display:flex;
  overflow:hidden;
  padding:8px 8px 0;
}
#isd-grid {
  flex:1;
  background:var(--isd-surface);
  border:1px solid var(--isd-border);
  border-radius:var(--isd-r-md);
  box-shadow:var(--isd-sh-sm);
  overflow:hidden;
}
/* ============================================================
   § TABULATOR OVERRIDES — Native-look + header-wrap + modern row chrome
   ISD-010 (2026-05-14): Column headers now wrap onto multiple lines so
     long labels like "Total Shortage incl. Expected (o)" stay readable
     without horizontal scroll. min-height + vertical centring keeps the
     header row visually tidy regardless of the longest label.
   ISD-009: Numeric cells are TWO-LINE — primary stock UOM + secondary
     conversion (e.g. "1000 g" / "1 kg"). Cell padding bumped so the
     dual line never clips.
   ============================================================ */
.tabulator { background:var(--isd-surface);border:none;font-family:inherit; }
.tabulator .tabulator-header {
  background:linear-gradient(180deg,#0f172a 0%, #1e293b 100%);
  color:#fff;
  border-bottom:2px solid var(--isd-brand);
  min-height:60px;
}
.tabulator .tabulator-header .tabulator-col {
  background:transparent !important;
  color:#fff;
  border-right:1px solid rgba(255,255,255,.08);
  font-size:11px;
  font-weight:600;
  letter-spacing:.02em;
  vertical-align:middle;
}
/* Wrap header text — ISD-010 */
.tabulator .tabulator-header .tabulator-col-content {
  padding:6px 8px !important;
  white-space:normal !important;
  display:flex;
  align-items:center;
  min-height:60px;
}
.tabulator .tabulator-header .tabulator-col-title-holder { width:100%; }
.tabulator .tabulator-header .tabulator-col-title {
  white-space:normal !important;
  overflow:visible !important;
  text-overflow:clip !important;
  line-height:1.3 !important;
  word-break:break-word;
  display:block !important;
  text-align:left;
}
/* Active sort arrow tint */
.tabulator .tabulator-header .tabulator-col.tabulator-sortable[aria-sort="ascending"]
.tabulator-col-content .tabulator-col-sorter .tabulator-arrow,
.tabulator .tabulator-header .tabulator-col.tabulator-sortable[aria-sort="descending"]
.tabulator-col-content .tabulator-col-sorter .tabulator-arrow {
  border-bottom-color:var(--isd-info);
  border-top-color:var(--isd-info);
}
/* Rows */
.tabulator-row {
  border-bottom:1px solid var(--isd-sl-100);
  font-size:12px;
  min-height:46px;
  transition:background .12s;
}
.tabulator-row.tabulator-row-even { background:var(--isd-sl-50); }
.tabulator-row.tabulator-row-odd  { background:var(--isd-surface); }
.tabulator-row.isd-row-pending-so { background:var(--isd-err-bg) !important; }
.tabulator-row.isd-row-pending-so:hover { background:#fecaca !important; }
.tabulator-row.tabulator-selectable:hover { background:var(--isd-sl-100) !important; }
/* Cells */
.tabulator-cell {
  padding:6px 10px !important;
  font-family:inherit;
  white-space:normal !important;
  word-break:break-word;
  vertical-align:middle !important;
  border-right:1px solid var(--isd-sl-100);
}
/* Numeric cell shell — right-aligned, mono-friendly */
.tabulator-cell.isd-num {
  text-align:right;
  font-family:"Geist Mono","Roboto Mono",ui-monospace,monospace;
  font-variant-numeric:tabular-nums;
}
.isd-num-primary {
  font-weight:600;
  color:var(--isd-sl-900);
  font-size:12.5px;
  line-height:1.25;
  white-space:nowrap;
}
.isd-num-alt {
  margin-top:2px;
  font-size:10.5px;
  line-height:1.3;
  color:var(--isd-sl-500);
  white-space:nowrap;
}
.isd-uom {
  font-size:10px;
  font-weight:500;
  color:var(--isd-sl-500);
  text-transform:uppercase;
  letter-spacing:.04em;
}
.isd-num-empty {
  color:var(--isd-sl-300);
}
.isd-num-mono {
  font-family:"Geist Mono","Roboto Mono",ui-monospace,monospace;
  font-variant-numeric:tabular-nums;
  font-weight:600;
}
/* Click affordance for drill-down */
.isd-cell-click {
  cursor:pointer;
  display:inline-block;
  padding:0 2px;
  border-radius:4px;
  transition:background .12s,box-shadow .12s;
}
.isd-cell-click:hover {
  background:#eef2ff;
  box-shadow:0 0 0 2px rgba(99,102,241,.18);
}
.isd-shortage-red    .isd-num-primary { color:var(--isd-err);  }
.isd-shortage-red    { background:rgba(254,226,226,.55);border-radius:4px; }
.isd-shortage-orange .isd-num-primary { color:var(--isd-warn); }
.isd-decision-pill {
  background:var(--isd-warn-bg);
  display:inline-block;
  padding:4px 8px;
  border-radius:6px;
  border:1px solid #fde68a;
}
.isd-decision-pill .isd-num-primary { color:#92400E; }
.isd-pct-red    .isd-num-mono { color:var(--isd-err);  }
.isd-pct-orange .isd-num-mono { color:var(--isd-warn); }
.isd-pct-green  .isd-num-mono { color:var(--isd-ok);   }
/* ============================================================
   § FROZEN COLUMN — z-index + opaque background.
   ISD-012 (2026-05-14): While horizontally scrolling, the wrapped
   column headers were rendering ON TOP of the frozen item_code header
   because Tabulator gives the frozen header column the same z-index
   as the scroll layer. Bumping z-index AND ensuring the frozen header
   has an explicit gradient background (matches the rest of the header)
   makes other headers correctly scroll BEHIND the frozen column.
   ============================================================ */
.tabulator .tabulator-frozen {
  box-shadow:4px 0 6px -3px rgba(15,23,42,.18);
  z-index:7 !important;
}
.tabulator .tabulator-header .tabulator-frozen {
  background:linear-gradient(180deg,#0f172a 0%, #1e293b 100%) !important;
  z-index:8 !important;
}
.tabulator-row .tabulator-frozen { background:inherit; }
.tabulator-row.tabulator-row-even .tabulator-frozen { background:var(--isd-sl-50); }
.tabulator-row.tabulator-row-odd  .tabulator-frozen { background:var(--isd-surface); }
.tabulator-row.isd-row-pending-so .tabulator-frozen { background:var(--isd-err-bg) !important; }
.tabulator-row.tabulator-selectable:hover .tabulator-frozen { background:var(--isd-sl-100) !important; }

/* ============================================================
   § LOADING OVERLAY — replaces innerHTML-style loader.
   ISD-013 (2026-05-14): The old loader called host.innerHTML and was
   wiped the moment Tabulator initialised. Now we render an overlay
   *over* the host (position:absolute), so it can appear before
   Tabulator mounts AND during refresh without fighting the grid.
   ============================================================ */
.isd-grid-wrap { position:relative; }
.isd-loading-overlay {
  position:absolute;
  inset:0;
  background:rgba(255,255,255,.78);
  backdrop-filter:blur(2px);
  -webkit-backdrop-filter:blur(2px);
  z-index:50;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  gap:14px;
  color:var(--isd-sl-700);
  font-size:12.5px;
  font-weight:500;
  pointer-events:none;
  opacity:0;
  transition:opacity .15s ease-out;
}
.isd-loading-overlay.isd-loading-on { opacity:1;pointer-events:auto; }
.isd-loading-card {
  display:flex;
  align-items:center;
  gap:14px;
  background:var(--isd-surface);
  padding:14px 22px;
  border-radius:var(--isd-r-md);
  box-shadow:var(--isd-sh-md);
  border:1px solid var(--isd-border);
}
.isd-spinner-big {
  width:28px;height:28px;
  border:3px solid var(--isd-sl-200);
  border-top-color:var(--isd-brand);
  border-right-color:var(--isd-brand);
  border-radius:50%;
  animation:isdSpin .7s linear infinite;
  flex-shrink:0;
}
.isd-loading-text { display:flex;flex-direction:column;gap:2px; }
.isd-loading-text strong { color:var(--isd-sl-900);font-weight:600; }
.isd-loading-text span   { color:var(--isd-sl-500);font-size:11px; }

/* ============================================================
   § QUICK-FILTER CHIPS BAR
   ISD-014 (2026-05-14): Toggleable filter chips for fast subset
   queries: Open SO, Open PO, Open WO, Shortage. Multi-select; chips

   ============================================================ */
.isd-qf {

/* ============================================================
   § MODAL — drill-down + email composer
   ============================================================ */
.isd-modal-bg {
  position:fixed;
  inset:0;
  background:rgba(15,23,42,.55);

}
.isd-modal-close:hover { color:#fff; }
.isd-modal-body { padding:14px 18px;overflow-y:auto;flex:1; }
.isd-modal-foot {
  padding:10px 18px;
  border-top:1px solid var(--isd-border);
  background:var(--isd-sl-50);
  display:flex;
  justify-content:flex-end;
  gap:8px;
}
.isd-formula {
  background:var(--isd-sl-50);
  border:1px solid var(--isd-border);
  border-radius:var(--isd-r-sm);
  padding:8px 10px;
  font-size:12px;
  color:var(--isd-sl-700);
  margin-bottom:12px;
  font-family:"Geist Mono","Roboto Mono",monospace;
}
.isd-dtable { width:100%;border-collapse:collapse;font-size:12px; }
.isd-dtable th,
.isd-dtable td {
  padding:6px 8px;
  border:1px solid var(--isd-border);
  text-align:left;
}
.isd-dtable th {
  background:var(--isd-sl-100);
  font-size:11px;
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:.04em;
  color:var(--isd-sl-700);
}
.isd-dtable td.isd-num { text-align:right;font-family:"Geist Mono","Roboto Mono",monospace; }
.isd-dtable tfoot td  {
  background:var(--isd-sl-50);
  font-weight:700;
  color:var(--isd-sl-900);
}
.isd-dtable a { color:var(--isd-brand);text-decoration:none; }
.isd-dtable a:hover { text-decoration:underline; }

/* Empty state. */
.isd-empty {
  padding:24px;
  text-align:center;
  color:var(--isd-sl-500);
  background:var(--isd-sl-50);
  border:1px dashed var(--isd-border);
  border-radius:var(--isd-r-md);
}

/* Loader. */
.isd-loader {
  display:flex;
  align-items:center;
  gap:10px;
  padding:20px;
  justify-content:center;
  color:var(--isd-sl-500);
  font-size:12px;
}
.isd-spinner {
  width:18px;height:18px;
  border:2px solid var(--isd-sl-200);
  border-top-color:var(--isd-brand);
  border-radius:50%;
  animation:isdSpin .6s linear infinite;
}
@keyframes isdSpin { to { transform:rotate(360deg); } }

/* Tooltip (Tabulator passes a function returning string for cell tooltip;
   we render a styled element via global title attribute fallback). */
.isd-tip {
  position:fixed;
  background:#0f172a;
  color:#fff;
  padding:8px 10px;
  border-radius:6px;
  font-size:11px;
  line-height:1.5;
  max-width:320px;
  pointer-events:none;
  opacity:0;
  transform:translateY(-4px);
  transition:opacity .12s,transform .12s;
  z-index:9999;
  box-shadow:0 4px 12px rgba(0,0,0,.25);
}
.isd-tip.isd-tip-on { opacity:1;transform:translateY(0); }
</style>

<div id="isd-root">

  <!-- ── Header: title + pending-status banner ─────────────────── -->

    </div>
    <div class="isd-field">

      <div id="isd-f-wh" class="isd-chips" data-isd-multi="warehouse">
        <input type="text" class="isd-chip-input" placeholder="Type to filter&hellip;"
               data-isd-chip-input="warehouse">
      </div>
    </div>
    <div class="isd-field">
      <label class="isd-label" for="isd-f-month">Will Consumed In (Month)</label>

    <div class="isd-field" style="grid-column:span 2;min-width:240px;">
      <label class="isd-label" for="isd-f-search">Universal Search</label>

  </div>

      <i class="fa-solid fa-rotate-right"></i> Refresh

      <i class="fa-solid fa-eraser"></i> Clear Filters
    </button>
    <button id="isd-btn-csv" class="isd-btn" type="button">
      <i class="fa-solid fa-file-csv"></i> Export CSV

    <button id="isd-btn-xlsx" class="isd-btn" type="button">
      <i class="fa-solid fa-file-excel"></i> Export XLSX

    <button id="isd-btn-email" class="isd-btn" type="button">
      <i class="fa-solid fa-envelope"></i> Email
    </button>
    <button id="isd-btn-settings" class="isd-btn" type="button">
      <i class="fa-solid fa-gear"></i> TOC Settings
    </button>
    <button id="isd-btn-guide" class="isd-btn" type="button">
      <i class="fa-solid fa-book"></i> Guide
    </button>
    <div id="isd-summary" class="isd-summary-bar"></div>

  <!-- ── Quick-filter chips ─────────────────────────────────────── -->
  <div class="isd-qf" id="isd-qf">

  </div>

  <!-- ── Floating tooltip (JS positions on hover) ──────────────── -->
  <div id="isd-tip" class="isd-tip"></div>

</div>
