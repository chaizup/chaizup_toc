<!--
  supply_chain_tracker.html — Supply Chain Tracker Page Template
  ══════════════════════════════════════════════════════════════════════════════

  ⚠️  CRITICAL — READ BEFORE EDITING ⚠️
  ══════════════════════════════════════

  FRAPPE HTML TEMPLATE LOADING MECHANISM:
    Frappe's page loader (frappe/model/utils/page.py → load_assets) reads this
    HTML file and wraps its contents in a JavaScript single-quoted string:

        frappe.templates["supply_chain_tracker"] = '<HTML_CONTENT_HERE>';

    The function scrub_html_template() does NOT escape single quotes.

    RESULT: Any single quote (') anywhere in this file will break the JS string
    literal and cause:   SyntaxError: Unexpected identifier 'X'
    The page will load BLANK with no error indicator.

  RULES FOR THIS FILE:
    ✓ Use double quotes for all HTML attributes:  class="foo", id="bar"
    ✓ For apostrophes in text, use:  &apos;  or rephrase to avoid
    ✓ NEVER write:  it's  can't  Click 'View'  style='...'
    ✓ NEVER use single quotes in placeholder text, button labels, or comments
      that will be rendered inside HTML elements

  HOW CACHE WORKS:
    After any change to HTML/JS/CSS, flush Redis:
      redis-cli -h redis-cache -p 6379 FLUSHALL

  FILE ROLES:
    supply_chain_tracker.html  — Template (this file, NO single quotes!)
    supply_chain_tracker.js    — Controller + SVG rendering + all logic
    supply_chain_tracker.css   — Tiger Theme styles
    supply_chain_tracker.json  — Page metadata + role permissions
    chaizup_toc/api/pipeline_api.py — Backend data API

  ══════════════════════════════════════════════════════════════════════════════
-->

<div class="sct-root">

  <!-- ── 1. COMMAND BAR ── -->
  <div class="sct-command-bar">
    <div class="sct-search-wrap">
      <span class="sct-search-icon">🔍</span>
      <input type="text" class="sct-search-input" id="sct-search" placeholder="Search Item Code or Document...">
      <button class="sct-search-clear" id="sct-search-clear">✕</button>
    </div>

    <div class="sct-view-btns">
      <button class="sct-view-btn active" data-view="tracker">
        <span>📊</span> Tracker
      </button>
      <button class="sct-view-btn" data-view="pipeline">
        <span>⛓️</span> Pipeline
      </button>
    </div>

    <button class="sct-filter-toggle" id="sct-filter-toggle">
      <span>👁️</span> Filter
      <span class="sct-filter-badge" id="sct-filter-badge">0</span>
    </button>

    <select class="sct-days-select" id="sct-days-back">
      <option value="15">Last 15 Days</option>
      <option value="30" selected>Last 30 Days</option>
      <option value="60">Last 60 Days</option>
      <option value="90">Last 90 Days</option>
    </select>
  </div>

  <!-- ── 2. FILTER PANEL ── -->
  <div class="sct-filter-panel" id="sct-filter-panel">
    <div class="sct-filter-group">
      <div class="sct-filter-group-label">Buffer Zone</div>
      <div class="sct-filter-pills">
        <div class="sct-fpill" data-filter="zone" data-value="Red">Red</div>
        <div class="sct-fpill" data-filter="zone" data-value="Yellow">Yellow</div>
        <div class="sct-fpill" data-filter="zone" data-value="Green">Green</div>
        <div class="sct-fpill" data-filter="zone" data-value="Black">Black</div>
      </div>
    </div>

    <div class="sct-filter-group">
      <div class="sct-filter-group-label">Supplier</div>
      <div class="sct-dd" id="dd-supplier">
        <div class="sct-dd-trigger">
          <input type="text" class="sct-dd-input" placeholder="Select Supplier..." readonly>
          <span class="sct-dd-arrow">▼</span>
        </div>
        <div class="sct-dd-list"></div>
      </div>
    </div>

    <div class="sct-filter-group">
      <div class="sct-filter-group-label">Item Group</div>
      <div class="sct-dd" id="dd-group">
        <div class="sct-dd-trigger">
          <input type="text" class="sct-dd-input" placeholder="Select Group..." readonly>
          <span class="sct-dd-arrow">▼</span>
        </div>
        <div class="sct-dd-list"></div>
      </div>
    </div>
  </div>

  <!-- ── 3. SUMMARY STRIP ── -->
  <div class="sct-summary-strip" id="sct-summary">
    <!-- Built dynamically by JS -->
  </div>

  <!-- ── 4. MAIN CONTENT ── -->
  <div class="sct-content">
    
    <!-- Loading Overlay -->
    <div class="sct-loading" id="sct-loader">
      <div class="sct-spinner"></div>
      <div>Loading Pipeline Data...</div>
    </div>

    <!-- Tracker View (Scrollable List) -->
    <div class="sct-tracker-wrap active" id="sct-view-tracker">
      <div id="sct-tracker-list"></div>
    </div>

    <!-- Pipeline View (SVG Canvas + Stages) -->
    <div class="sct-pipeline-wrap" id="sct-view-pipeline">
      <div class="sct-canvas-bar">
        <span class="sct-canvas-hint">Click a card to trace exact lineage. Click View for ERP details.</span>
        <button class="sct-clear-btn" id="sct-clear-btn">
          Clear Selection ✕
        </button>
      </div>

      <div class="sct-pipeline-scroll" id="sct-pl-scroll">
        <div class="pl-grid" id="sct-pl-grid">
          <!-- The SVG layer for Bezier curves -->
          <svg id="sct-svg-overlay"></svg>
          <!-- Stage columns 1-7 built dynamically by JS -->
        </div>
      </div>
    </div>

  </div>

  <!-- ── 5. DETAIL SIDE PANEL ── -->
  <div class="sct-panel" id="sct-panel">
    <div class="sct-panel-header">
      <div class="sct-panel-header-info">
        <div class="sct-panel-title" id="sct-panel-title">—</div>
        <div class="sct-panel-subtitle" id="sct-panel-subtitle">—</div>
      </div>
      <button class="sct-panel-close" id="sct-panel-close">✕</button>
    </div>
    
    <div class="sct-panel-body" id="sct-panel-body">
      <!-- Data injected by JS -->
    </div>

    <div class="sct-panel-actions" id="sct-panel-actions">
      <!-- Buttons injected by JS -->
    </div>
  </div>

</div>
